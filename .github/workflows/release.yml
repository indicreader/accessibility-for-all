name: Package and Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release and Upload Asset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          zip -r inf-scroll-pro.zip background.js content.js manifest.json options.css options.html options.js popup.css popup.html popup.js icons README.md LICENSE

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: inf-scroll-pro.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
